<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Caixa Misteriosa VIP</title>

<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Inter:wght@600;800;1000&display=swap" rel="stylesheet">

<style>
:root{
--bg:#121125;
--accent:#ff75e2;
--text:#f6f6ff;
--stroke: rgba(255,255,255,.12);
--shadow: 0 26px 70px rgba(0,0,0,.55);
}

*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}

html,body{
height:100%;
margin:0;
overflow:hidden;
touch-action:manipulation;
}

body{
font-family:Inter,sans-serif;
color:var(--text);
background: radial-gradient(950px 520px at 50% -10%, rgba(255,117,226,.22), transparent 60%), linear-gradient(180deg, var(--bg), var(--bg));
display:flex;
align-items:center;
justify-content:center;
}

.wrap{
width:min(500px,95%);
border-radius:34px;
border:1px solid var(--stroke);
background: linear-gradient(180deg, rgba(255,255,255,.07), rgba(255,255,255,.03));
box-shadow: var(--shadow);
padding:40px 20px;
text-align:center;
}

h1{
font-family:Orbitron;
font-size:28px;
margin:10px 0;
background: linear-gradient(180deg,#fff,var(--accent));
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
}

.box-container{
height:280px;
display:flex;
align-items:center;
justify-content:center;
cursor:pointer;
}

.boxImage{
width:220px;
transition: transform .05s ease-out;
filter: drop-shadow(0 0 15px rgba(255,117,226,.3));
}

.tap-hit{animation:tapHit .1s ease-out;}

@keyframes tapHit{
0%{transform:scale(1)}
50%{transform:scale(.9)}
100%{transform:scale(1)}
}

.shake{animation:boxShake .3s ease-in-out}

@keyframes boxShake{
0%,100%{transform:translateX(0)}
20%{transform:translateX(-10px) rotate(-2deg)}
40%{transform:translateX(10px) rotate(2deg)}
60%{transform:translateX(-5px)}
80%{transform:translateX(5px)}
}

.explode{animation:boxExplode .6s cubic-bezier(.17,.89,.32,1.49) forwards}

@keyframes boxExplode{
0%{transform:scale(1)}
30%{transform:scale(1.4);opacity:.8}
100%{transform:scale(3);opacity:0}
}

.tap-hint{
margin-top:15px;
font-weight:900;
font-size:14px;
letter-spacing:2px;
color:var(--accent);
animation:pulse 1.5s infinite;
}

@keyframes pulse{
0%,100%{opacity:1}
50%{opacity:.4}
}

#overlay{
display:none;
position:fixed;
inset:0;
background:rgba(0,0,0,.9);
backdrop-filter:blur(15px);
z-index:100;
align-items:center;
justify-content:center;
}

.modal{
background:white;
color:#111;
padding:40px 30px;
border-radius:30px;
text-align:center;
width:90%;
max-width:400px;
}

.bigPrize{
font-family:Orbitron;
font-size:22px;
color:#d42bb2;
margin:15px 0;
font-weight:900;
}

.codeBox{
background:#f0f0f0;
border:2px dashed #ccc;
padding:15px;
border-radius:15px;
display:flex;
justify-content:space-between;
align-items:center;
gap:10px;
}

.code{
font-family:monospace;
font-size:18px;
font-weight:900;
}

.copyBtn{
background:#111;
color:white;
border:none;
padding:10px 15px;
border-radius:10px;
cursor:pointer;
font-weight:800;
font-size:12px;
}

.lockedTag{
display:inline-flex;
align-items:center;
justify-content:center;
margin-top:14px;
padding:10px 14px;
border-radius:999px;
border:1px solid rgba(255,255,255,.18);
background:rgba(255,255,255,.06);
font-weight:900;
letter-spacing:1.2px;
font-size:12px;
}

.lockedSub{
margin-top:10px;
font-size:12px;
color:rgba(255,255,255,.75);
font-weight:700;
}

.disabledArea{
pointer-events:none;
opacity:.55;
filter:grayscale(.25);
}
</style>
</head>

<body>

<div class="wrap">

<h1>CAIXA MISTERIOSA VIP</h1>

<div class="tap-hint" id="hintText">
TOQUE VÁRIAS VEZES PARA QUEBRAR
</div>

<div class="lockedTag" id="lockedTag" style="display:none">
🔒 JOGO BLOQUEADO
</div>

<div class="lockedSub" id="lockedSub" style="display:none">
Volte no próximo VIP Day para jogar novamente.
</div>

<div class="box-container" id="boxArea" onpointerdown="handleTap(event)">
<img id="mainBox" class="boxImage" src="https://ricomx.ft-crm.com/media-api/serve/df6b594c-e8bd-402d-b186-efca9501a635_2.png">
</div>

</div>

<div id="overlay">
<div class="modal">

<h2 style="font-size:14px;opacity:.6">
DESBLOQUEADO COM SUCESSO
</h2>

<div class="bigPrize">
SEU CÓDIGO DE BÔNUS
</div>

<div class="codeBox">
<div class="code" id="codeText">-----</div>
<button class="copyBtn" onclick="copyCode()">COPIAR</button>
</div>

<p style="font-size:12px;color:#666;font-weight:700">
Resgate agora na seção <b>Código de Bônus</b>.
</p>

</div>
</div>

<script>

const EVENT_END = new Date("2026-03-16T00:00:00-03:00").getTime();

const LS_KEY="vip_mystery_box_claim_v1";

const VOUCHER_CODES=["5dcy2J","m0s4CA","h9GFsP"];

let taps=0;
const requiredTaps=10;
let isBroken=false;

const box=document.getElementById("mainBox");
const boxArea=document.getElementById("boxArea");
const hintText=document.getElementById("hintText");
const lockedTag=document.getElementById("lockedTag");
const lockedSub=document.getElementById("lockedSub");
const overlay=document.getElementById("overlay");

init();

function init(){

if(Date.now()>=EVENT_END){

hintText.style.display="none";
lockedTag.style.display="inline-flex";
lockedSub.style.display="block";
boxArea.classList.add("disabledArea");
isBroken=true;
return;

}

if(localStorage.getItem(LS_KEY)){
lockDevice();
}

}

function lockDevice(){

hintText.style.display="none";
lockedTag.style.display="inline-flex";
lockedSub.innerText="Este dispositivo já resgatou um código.";
lockedSub.style.display="block";
boxArea.classList.add("disabledArea");
isBroken=true;

}

function handleTap(e){

if(e)e.preventDefault();

if(isBroken||localStorage.getItem(LS_KEY))return;

taps++;

box.classList.remove("tap-hit","shake");
void box.offsetWidth;

if(taps>(requiredTaps*0.7)){
box.classList.add("shake");
}else{
box.classList.add("tap-hit");
}

if(taps>=requiredTaps){
breakBox();
}

}

function breakBox(){

isBroken=true;

box.classList.add("explode");

setTimeout(()=>{

confetti({
particleCount:220,
spread:95,
origin:{y:.55},
colors:["#ff75e2","#ffffff","#ffcf4b"]
});

revealReward();

},400);

}

function pickVoucherCode(){

const existing=localStorage.getItem(LS_KEY);
if(existing)return existing;

const code=VOUCHER_CODES[Math.floor(Math.random()*VOUCHER_CODES.length)];

localStorage.setItem(LS_KEY,code);

return code;

}

function revealReward(){

const code=pickVoucherCode();

document.getElementById("codeText").innerText=code;

overlay.style.display="flex";

}

function copyCode(){

const code=document.getElementById("codeText").innerText;

navigator.clipboard.writeText(code).then(()=>{

const btn=document.querySelector(".copyBtn");

btn.innerText="COPIADO!";

setTimeout(()=>{btn.innerText="COPIAR";},2000);

});

}

</script>

</body>
</html>
